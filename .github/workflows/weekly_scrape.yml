name: Weekly Play Store Scrape

on:
  schedule:
    # Every Sunday at 9:30 PM IST (4:00 PM UTC)
    - cron: "0 16 * * 0"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GOOGLE_SHEETS_ID:            ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit snapshots back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/ dashboard_data.json
          git diff --cached --quiet || git commit -m "chore: weekly snapshot $(date -u +'%Y-%m-%d')"
          git push
